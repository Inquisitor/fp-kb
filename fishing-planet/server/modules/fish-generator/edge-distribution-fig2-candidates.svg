<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="600" height="340" fill="#fafafa" rx="4"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Figure 2: Candidate Edge Functions — Comparison</text>
  <text x="300" y="40" text-anchor="middle" font-size="10" fill="#888">All curves start at p(0) = 1. Only power-law and exponential reach (near) zero.</text>

  <!-- Axes: chart x=[80,530], y=[60,270]. Arrow extends to 563. -->
  <line x1="80" y1="270" x2="563" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="80" y1="270" x2="80" y2="48" stroke="#555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <text x="305" y="305" text-anchor="middle" font-size="11" fill="#555">Position within edge zone: s ∈ [0, 1]</text>
  <text x="28" y="160" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,28,160)">Relative density p(s)</text>

  <!-- Ticks -->
  <text x="80" y="288" text-anchor="middle" font-size="10" fill="#666">0</text>
  <text x="530" y="288" text-anchor="middle" font-size="10" fill="#666">1</text>
  <text x="305" y="288" text-anchor="middle" font-size="10" fill="#666">0.5</text>
  <line x1="305" y1="270" x2="305" y2="275" stroke="#555"/>
  <text x="70" y="64" text-anchor="end" font-size="10" fill="#666">1.0</text>
  <line x1="75" y1="60" x2="85" y2="60" stroke="#555"/>
  <text x="70" y="274" text-anchor="end" font-size="10" fill="#666">0</text>
  <text x="70" y="169" text-anchor="end" font-size="9" fill="#aaa">0.5</text>
  <line x1="75" y1="165" x2="530" y2="165" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="60" x2="530" y2="60" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- ===== CURVES (computed coordinates) ===== -->

  <!-- Normal (μ=0.85, σ=0.08): p(1) ≈ 0.38 — barely any falloff, doesn't reach zero -->
  <polyline points="
    80.0,60.0 95.0,65.4 110.0,70.8 125.0,76.2 140.0,81.4
    155.0,86.6 170.0,91.8 185.0,96.8 200.0,101.8 215.0,106.8
    230.0,111.6 245.0,116.4 260.0,121.1 275.0,125.7 290.0,130.2
    305.0,134.7 320.0,139.0 335.0,143.3 350.0,147.5 365.0,151.6
    380.0,155.6 395.0,159.6 410.0,163.4 425.0,167.1 440.0,170.8
    455.0,174.4 470.0,177.9 485.0,181.3 500.0,184.6 515.0,187.8
    530.0,190.9"
    fill="none" stroke="#cc3333" stroke-width="2.2" stroke-dasharray="8,5"/>

  <!-- Power-law α=2: p(s) = (1−s)², reaches exactly zero -->
  <polyline points="
    80.0,60.0 95.0,73.8 110.0,87.1 125.0,99.9 140.0,112.3
    155.0,124.2 170.0,135.6 185.0,146.6 200.0,157.1 215.0,167.1
    230.0,176.7 245.0,185.8 260.0,194.4 275.0,202.6 290.0,210.3
    305.0,217.5 320.0,224.3 335.0,230.6 350.0,236.4 365.0,241.8
    380.0,246.7 395.0,251.1 410.0,255.1 425.0,258.6 440.0,261.6
    455.0,264.2 470.0,266.3 485.0,267.9 500.0,269.1 515.0,269.8
    530.0,270.0"
    fill="none" stroke="#228b22" stroke-width="2.5"/>

  <!-- Exponential λ=7: p(s) = e^(−7s), asymptotic to zero -->
  <polyline points="
    80.0,60.0 95.0,103.7 110.0,138.3 125.0,165.7 140.0,187.4
    155.0,204.6 170.0,218.2 185.0,229.0 200.0,237.5 215.0,244.3
    230.0,249.6 245.0,253.9 260.0,257.2 275.0,259.9 290.0,262.0
    305.0,263.7 320.0,265.0 335.0,266.0 350.0,266.9 365.0,267.5
    380.0,268.0 395.0,268.4 410.0,268.8 425.0,269.0 440.0,269.2
    455.0,269.4 470.0,269.5 485.0,269.6 500.0,269.7 515.0,269.8
    530.0,269.8"
    fill="none" stroke="#2266aa" stroke-width="2.5"/>

  <!-- Starting point dot -->
  <circle cx="80" cy="60" r="4" fill="#333" stroke="white" stroke-width="1.5"/>

  <!-- ===== ENDPOINT ANNOTATIONS (right side, x>535) ===== -->

  <!-- Normal endpoint: p(1) ≈ 0.38, y ≈ 191 -->
  <circle cx="530" cy="191" r="3" fill="#cc3333"/>
  <line x1="533" y1="191" x2="545" y2="191" stroke="#cc3333" stroke-width="0.8"/>
  <text x="548" y="187" font-size="9" fill="#cc3333" font-weight="bold">≈ 0.38</text>
  <text x="548" y="198" font-size="8" fill="#cc3333">still ≫ 0</text>

  <!-- Power-law endpoint: p(1) = 0, y = 270 -->
  <circle cx="530" cy="270" r="3" fill="#228b22"/>
  <text x="538" y="261" font-size="9" fill="#228b22" font-weight="bold">= 0</text>

  <!-- Exponential endpoint: p(1) ≈ 0.001, y ≈ 269.8 -->
  <circle cx="530" cy="269.8" r="3" fill="#2266aa"/>
  <text x="538" y="250" font-size="9" fill="#2266aa" font-weight="bold">≈ 0.001</text>

  <!-- ===== LEGEND (top-right, above curves) ===== -->
  <rect x="330" y="72" width="200" height="55" rx="4" fill="white" stroke="#ddd" stroke-width="0.8" opacity="0.95"/>
  <line x1="340" y1="86" x2="365" y2="86" stroke="#cc3333" stroke-width="2.2" stroke-dasharray="8,5"/>
  <text x="370" y="90" font-size="9.5" fill="#333">Normal (μ=0.85, σ=0.08)</text>
  <line x1="340" y1="101" x2="365" y2="101" stroke="#228b22" stroke-width="2.5"/>
  <text x="370" y="105" font-size="9.5" fill="#333">Power-law (α=2)</text>
  <line x1="340" y1="116" x2="365" y2="116" stroke="#2266aa" stroke-width="2.5"/>
  <text x="370" y="120" font-size="9.5" fill="#333">Exponential (λ=7)</text>

  <!-- ===== KEY INSIGHT (bottom-left, below curves) ===== -->
  <rect x="130" y="297" width="360" height="28" rx="4" fill="#fff8e0" stroke="#e0c040" stroke-width="0.8"/>
  <text x="150" y="309" font-size="9" fill="#886600">Normal: barely any falloff, never reaches zero. Not suitable.</text>
  <text x="150" y="320" font-size="9" fill="#886600">Power-law and exponential: smooth to (near) zero by construction.</text>
</svg>
