  <text x="556" y="258" font-size="9" fill="#0072B2" font-weight="bold">α=2</text>
  <text x="556" y="242" font-size="9" fill="#009E73" font-weight="bold">α=5</text>
  <text x="556" y="222" font-size="9" fill="#D55E00" font-weight="bold">λ=3</text>
  <text x="556" y="206" font-size="9" fill="#E69F00" font-weight="bold">λ=7</text>
  <text x="556" y="190" font-size="9" fill="#B8860B" font-weight="bold">λ=15</text>

  <!-- Legend -->
  <rect x="85" y="48" width="240" height="55" rx="4" fill="white" stroke="#ddd"/>
  <line x1="95" y1="62" x2="115" y2="62" stroke="#56B4E9" stroke-width="2"/>
  <line x1="118" y1="62" x2="138" y2="62" stroke="#0072B2" stroke-width="2"/>
  <line x1="141" y1="62" x2="161" y2="62" stroke="#009E73" stroke-width="2"/>
  <text x="167" y="66" font-size="10" fill="#333">Power-law: ((1−x)/(1−T))^α</text>
  <line x1="95" y1="79" x2="115" y2="79" stroke="#D55E00" stroke-width="2"/>
  <line x1="118" y1="79" x2="138" y2="79" stroke="#E69F00" stroke-width="2"/>
  <line x1="141" y1="79" x2="161" y2="79" stroke="#B8860B" stroke-width="2"/>
  <text x="167" y="83" font-size="10" fill="#333">Exponential: exp(−λ·(x−T)/(1−T))</text>
  <text x="167" y="98" font-size="9" fill="#888" font-style="italic">Solid = default, dashed = variants</text>

  <!-- Key difference annotation -->
  <rect x="370" y="48" width="215" height="28" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="0.8"/>
  <text x="380" y="60" font-size="9" fill="#0072B2">Power-law → 0 at 100%  (impossible max)</text>
  <text x="380" y="72" font-size="9" fill="#E69F00">Exponential → ε at 100%  (asymptotic)</text>
