<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" font-family="Segoe UI, sans-serif">
  <!-- Wong palette: 6 curves, each unique color -->
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="620" height="360" fill="#fafafa" rx="4"/>
  <text x="310" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Figure 3: Power-Law vs Exponential Decay in Tail Zone</text>
  <text x="310" y="40" text-anchor="middle" font-size="10" fill="#888">Both curves start at p(threshold) = 1 and decrease smoothly — no seam</text>

  <!-- Axes: chart area x=[70,550], y=[60,290] => width=480, height=230 -->
  <line x1="70" y1="290" x2="560" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="70" y1="290" x2="70" y2="52" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <text x="310" y="328" text-anchor="middle" font-size="11" fill="#555">Position within tail zone: threshold → 100%</text>
  <text x="22" y="175" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,22,175)">Acceptance weight p(x)</text>

  <!-- Ticks -->
  <text x="70" y="306" text-anchor="middle" font-size="10" fill="#666">T</text>
  <text x="550" y="306" text-anchor="middle" font-size="10" fill="#666">100%</text>
  <text x="58" y="64" text-anchor="end" font-size="10" fill="#666">1.0</text>
  <line x1="65" y1="60" x2="75" y2="60" stroke="#555"/>
  <text x="58" y="294" text-anchor="end" font-size="10" fill="#666">0</text>

  <!-- Grid lines -->
  <line x1="70" y1="60" x2="550" y2="60" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="70" y1="117.5" x2="550" y2="117.5" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="70" y1="175" x2="550" y2="175" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="70" y1="232.5" x2="550" y2="232.5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="58" y="121" text-anchor="end" font-size="9" fill="#aaa">0.75</text>
  <text x="58" y="179" text-anchor="end" font-size="9" fill="#aaa">0.50</text>
  <text x="58" y="236" text-anchor="end" font-size="9" fill="#aaa">0.25</text>

