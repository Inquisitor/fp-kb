<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
  </defs>

  <rect width="600" height="320" fill="#fafafa" rx="4"/>
  <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Figure 2: Normal-First Approach — Seam Discontinuity</text>

  <!-- Axes -->
  <line x1="60" y1="260" x2="560" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="60" y1="260" x2="60" y2="40" stroke="#555" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <text x="310" y="295" text-anchor="middle" font-size="11" fill="#555">Normalized weight</text>
  <text x="18" y="150" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,18,150)">Density f(x)</text>

  <!-- Threshold line -->
  <line x1="440" y1="45" x2="440" y2="260" stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="440" y="42" text-anchor="middle" font-size="10" fill="#999">threshold</text>

  <!-- Ticks -->
  <text x="60" y="278" text-anchor="middle" font-size="10" fill="#666">0%</text>
  <text x="535" y="278" text-anchor="middle" font-size="10" fill="#666">100%</text>

  <!-- Flat zone (high) -->
  <rect x="60" y="95" width="380" height="165" fill="#ff6b6b22" stroke="none"/>
  <line x1="60" y1="95" x2="440" y2="95" stroke="#ff6b6b" stroke-width="2.5"/>

  <!-- Normal tail (low) -->
  <path d="M440,195 C460,200 480,215 500,235 C515,248 525,255 535,258" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
  <path d="M440,195 C460,200 480,215 500,235 C515,248 525,255 535,258 L535,260 L440,260 Z" fill="#ff6b6b15" stroke="none"/>

  <!-- Gap annotation -->
  <line x1="440" y1="95" x2="440" y2="195" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="435" y1="95" x2="445" y2="95" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="435" y1="195" x2="445" y2="195" stroke="#ff6b6b" stroke-width="2"/>

  <!-- Gap label -->
  <line x1="445" y1="145" x2="490" y2="130" stroke="#cc0000" stroke-width="0.8"/>
  <text x="493" y="120" font-size="10" fill="#cc0000" font-weight="bold">6.5× drop</text>
  <text x="493" y="132" font-size="9" fill="#cc0000">(μ=0.5, σ=0.2)</text>

  <!-- Left density label -->
  <text x="50" y="99" text-anchor="end" font-size="9" fill="#666">Φ(T)/T</text>
  <text x="50" y="199" text-anchor="end" font-size="9" fill="#666">φ(T)</text>

  <!-- ELI5 annotation -->
  <rect x="100" y="45" width="280" height="36" rx="4" fill="#fff8e0" stroke="#e0c040" stroke-width="0.8"/>
  <text x="115" y="60" font-size="9" fill="#886600">Making the tail rare forces the flat zone high.</text>
  <text x="115" y="73" font-size="9" fill="#886600">Making the seam smooth requires a fat tail. Can't have both.</text>
</svg>
